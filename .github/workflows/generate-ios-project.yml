name: Generate iOS Xcode Project

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - "scripts/configure-ios.mjs"
      - "ios/.gitignore"
      - ".github/workflows/generate-ios-project.yml"

concurrency:
  group: generate-ios-project
  cancel-in-progress: true

permissions:
  contents: write
  statuses: write

jobs:
  generate-ios:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Mark iOS generation pending
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'iOS Xcode Project',
              description: 'Generating a self-contained iPhone project',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JavaScript dependencies
        run: npm install

      - name: Generate, sync, and vendor Capacitor iOS
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi
          npx cap sync ios
          node scripts/configure-ios.mjs

      - name: Validate a clean Xcode clone without node_modules
        run: |
          rm -rf node_modules
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData"
          rm -rf "$RUNNER_TEMP/ark-ios-source-packages"

          xcodebuild \
            -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/ark-ios-source-packages"

          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/ark-ios-source-packages" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Commit the complete Xcode project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f ios package-lock.json package.json capacitor.config.json scripts/configure-ios.mjs .github/workflows/generate-ios-project.yml
          if git diff --cached --quiet; then
            echo "The self-contained iOS project is already current."
          else
            git commit -m "Make the iPhone project work from a fresh clone"
            git push origin main
          fi

      - name: Mark iOS generation successful
        if: success()
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'iOS Xcode Project',
              description: 'Fresh-clone iPhone build passed without node_modules',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark iOS generation failed
        if: failure()
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'iOS Xcode Project',
              description: 'The fresh-clone iPhone build still needs correction',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

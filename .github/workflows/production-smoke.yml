name: Production Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "package.json"
      - "next.config.*"
      - ".github/workflows/production-smoke.yml"

concurrency:
  group: production-smoke-test
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mark production smoke test pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'Production Smoke Test',
              description: 'Waiting for the live APIs to become healthy',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Verify live page and JSON APIs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          BASE_URL="https://ark-websites-ocm.vercel.app"

          wait_for_response() {
            local name="$1"
            local expected_status="$2"
            shift 2

            for attempt in $(seq 1 36); do
              rm -f response-body response-headers
              status=$(curl --silent --show-error \
                --output response-body \
                --dump-header response-headers \
                --write-out '%{http_code}' \
                "$@" || true)

              content_type=$(awk 'BEGIN { IGNORECASE=1 } /^content-type:/ { value=$0 } END { gsub(/\r/, "", value); print value }' response-headers 2>/dev/null || true)
              echo "$name attempt $attempt: HTTP $status $content_type"

              if [ "$status" = "$expected_status" ]; then
                return 0
              fi

              if [ "$attempt" -lt 36 ]; then
                sleep 10
              fi
            done

            echo "::$name failed::Expected HTTP $expected_status but received $status"
            cat response-body || true
            return 1
          }

          wait_for_response "Home page" "200" "$BASE_URL/"

          wait_for_response \
            "Signup API" \
            "400" \
            --request POST \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            "$BASE_URL/api/signup/complete"
          python -m json.tool response-body >/dev/null

          AUTH_ARGS=()
          if [ -n "$CRON_SECRET" ]; then
            AUTH_ARGS=(--header "Authorization: Bearer $CRON_SECRET")
          fi

          wait_for_response \
            "Workflow scheduler API" \
            "200" \
            --header "Accept: application/json" \
            "${AUTH_ARGS[@]}" \
            "$BASE_URL/api/cron/workflow"
          python -m json.tool response-body >/dev/null

      - name: Mark production smoke test successful
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'Production Smoke Test',
              description: 'Live page, signup API, and scheduler API are healthy',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark production smoke test failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'Production Smoke Test',
              description: 'A live production route returned the wrong status or non-JSON output',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

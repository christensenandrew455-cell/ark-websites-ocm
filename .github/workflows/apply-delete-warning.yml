name: Apply Client Delete Warning

on:
  push:
    branches: [main]
    paths:
      - scripts/apply-delete-warning.mjs

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply delete warning
        run: node scripts/apply-delete-warning.mjs

      - name: Commit warning
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/components/ReviewClientsNative.js
          git diff --cached --quiet || git commit -m "Require two confirmations before deleting a client"
          git push

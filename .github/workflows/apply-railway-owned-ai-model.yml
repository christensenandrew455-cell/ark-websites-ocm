name: Apply Railway-Owned AI Runtime

on:
  push:
    branches:
      - agent/receptionist-control-plane
    paths:
      - .github/workflows/apply-railway-owned-ai-model.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/receptionist-control-plane

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove AI model management from Vercel
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path, old, new, label):
              file = Path(path)
              source = file.read_text(encoding="utf-8")
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one {label} in {path}, found {count}")
              file.write_text(source.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "app/api/admin/receptionists/route.js",
              '    aiModel: text(settings.aiModel || "gpt-realtime"),\n',
              '',
              "profile AI model field",
          )
          replace_once(
              "app/api/admin/receptionists/route.js",
              '    receptionistScript,\n    aiModel: text(body.aiModel || "gpt-realtime"),\n    aiVoice:',
              '    receptionistScript,\n    aiModel: FieldValue.delete(),\n    aiVoice:',
              "saved AI model field",
          )
          replace_once(
              "app/api/receptionist/config/route.js",
              '        model: text(settings.aiModel || "gpt-realtime"),\n',
              '',
              "config response AI model field",
          )
          replace_once(
              "app/receptionists/page.js",
              '                <Field label="Realtime model"><Input value={form.aiModel} onChange={(event) => update("aiModel", event.target.value)} placeholder="gpt-realtime" /></Field>\n',
              '',
              "realtime model input",
          )

          docs = Path("RECEPTIONIST_MULTI_TENANT.md")
          text = docs.read_text(encoding="utf-8")
          text = text.replace(
              "The administrator can edit the script, model, voice, pacing, pause detection, and business information.",
              "The administrator can edit the script, voice, pacing, pause detection, and business information. The AI model and provider runtime stay on Railway.",
          )
          if "Vercel does not need AI_MODEL" not in text:
              text += "\n## Runtime ownership\n\nVercel is only the control plane and Firestore-backed profile store. Vercel does not need `AI_MODEL`, `OPENAI_API_KEY`, or other AI runtime variables. The shared Railway service owns the model and provider credentials.\n"
          docs.write_text(text, encoding="utf-8")
          PY

      - name: Verify Vercel control plane
        run: |
          node --check app/api/admin/receptionists/route.js
          node --check app/api/receptionist/config/route.js
          ! grep -R "aiModel\|AI_MODEL" app/api/admin/receptionists app/api/receptionist/config app/receptionists/page.js

      - name: Commit control-plane fix
        run: |
          rm .github/workflows/apply-railway-owned-ai-model.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/api/admin/receptionists/route.js app/api/receptionist/config/route.js app/receptionists/page.js RECEPTIONIST_MULTI_TENANT.md .github/workflows/apply-railway-owned-ai-model.yml
          git commit -m "Keep AI runtime configuration on Railway"
          git push origin HEAD:agent/receptionist-control-plane

# trigger

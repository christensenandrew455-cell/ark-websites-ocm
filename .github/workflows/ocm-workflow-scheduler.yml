name: OCM Workflow Scheduler

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-workflow-check:
    runs-on: ubuntu-latest
    steps:
      - name: Run OCM workflow check
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          AUTH_ARGS=()
          if [ -n "$CRON_SECRET" ]; then
            AUTH_ARGS=(-H "Authorization: Bearer $CRON_SECRET")
          fi

          curl --fail-with-body --silent --show-error \
            --retry 3 \
            --retry-delay 10 \
            -H "Accept: application/json" \
            "${AUTH_ARGS[@]}" \
            https://ark-websites-ocm.vercel.app/api/cron/workflow

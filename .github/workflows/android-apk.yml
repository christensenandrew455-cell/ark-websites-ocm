name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "public/**"
      - "mobile-shell/**"
      - "scripts/**"
      - "capacitor.config.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-apk.yml"

concurrency:
  group: android-build
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Mark Android build pending
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'Android Build',
              description: 'Building the installable Android APK',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install JavaScript dependencies
        run: npm install

      - name: Generate and verify Capacitor Android project
        run: npm run mobile:android:setup

      - name: Add Firebase Android configuration
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            node -e "JSON.parse(require('fs').readFileSync('android/app/google-services.json', 'utf8')); console.log('Firebase Cloud Messaging configuration added and validated.')"
          else
            echo "::error::FIREBASE_ANDROID_GOOGLE_SERVICES_JSON is not configured."
            exit 1
          fi

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ark-client-center-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Mark Android build successful
        if: success()
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'Android Build',
              description: 'Installable Android APK built successfully',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark Android build failed
        if: failure()
        uses: actions/github-script@v7
        with:
          retries: 3
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'Android Build',
              description: 'The Android APK build failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

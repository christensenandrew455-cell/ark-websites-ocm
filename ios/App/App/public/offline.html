<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>ARK Client Center Offline</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #f8fafc; color: #0f172a; }
      main { max-width: 30rem; padding: 2rem; text-align: center; }
      h1 { margin: 0 0 .75rem; font-size: 1.75rem; }
      p { margin: 0 0 1.5rem; line-height: 1.6; color: #475569; }
      button { border: 0; border-radius: .75rem; padding: .8rem 1.1rem; background: #0f172a; color: white; font-weight: 800; }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #f8fafc; }
        p { color: #cbd5e1; }
        button { background: #f8fafc; color: #0f172a; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>No internet connection</h1>
      <p>Reconnect to the internet, then reopen ARK Client Center.</p>
      <button type="button" onclick="location.reload()">Try Again</button>
    </main>
  </body>
</html>
